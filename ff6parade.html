<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Final Fantasy VI Parade</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #F00;
            font-family: system-ui, sans-serif;
        }

        .actor-wrapper {
            position: fixed;
            bottom: 0px;
            will-change: transform;
            user-select: none;
            pointer-events: none;
        }

        .actor {
            transform-origin: center bottom;
        }

        @keyframes bob {
            0% {
                transform: translateY(0);
            }

            50% {
                /* use a CSS variable for the vertical shift so we can vary per element */
                transform: translateY(var(--bob-shift, -10px));
            }

            100% {
                transform: translateY(0);
            }
        }

        .float {
            animation: bob ease-in-out 2s infinite;
        }
    </style>
</head>

        ];

        const actors = [];
        const screenWidth = () => window.innerWidth || document.documentElement.clientWidth;
        const screenHeight = () => window.innerHeight || document.documentElement.clientHeight;

        // returns a value between 0.5× and 1.5× the provided number
        function randomScale(value) {
            const factor = 0.5 + Math.random(); // [0.5,1.5)
            return value * factor;
        }

        // object-oriented actor with behavior encapsulated
        class Actor {
            constructor(config) {
                this.config = config;
                this.speed = randomScale(config.speed);
                this.position = screenWidth() + randomScale(screenWidth() / 5); // start off-screen to the right with some random offset
                // assign a small random vertical offset only for floating actors
                this.verticalOffset = config.animation === 'float' ? randomScale(screenHeight() / 5) : 0;
                this.wrapper = this._createElement();
                actors.push(this);
            }

            _createElement() {
                const wrapper = document.createElement('div');
                wrapper.className = 'actor-wrapper';
                wrapper.style.transform = `translateX(${this.position}px)`;
                // apply the vertical offset via bottom property so floats start staggered
                if (this.config.animation === 'float' && this.verticalOffset) {
                    wrapper.style.bottom = `${this.verticalOffset}px`;
                }

                const img = document.createElement('img');
                img.src = this.config.image;
                img.className = this.config.animation ? `actor ${this.config.animation}` : 'actor';

                // if animation is float, give a random phase offset so directions aren't in sync
                if (this.config.animation === 'float') {
                    // animation duration is 2s; give a random negative delay to start at some point in cycle
                    const delay = -Math.random() * 2;
                    img.style.animationDelay = `${delay}s`;

                    // randomize the bobbing amplitude
                    const shift = -randomScale(this.verticalOffset / 2); // negative value
                    img.style.setProperty('--bob-shift', `${shift}px`);
                }

                wrapper.appendChild(img);
                document.body.appendChild(wrapper);
                return wrapper;
            }

            update(dt, width) {
                this.position -= this.speed * dt;
                if (this.position < -screenWidth() / 5) {
                    this.destroy();
                    new Actor(Actor.randomConfig());
                    return;
                }

                this.wrapper.style.transform = `translateX(${this.position}px)`;
            }

            destroy() {
                const idx = actors.indexOf(this);
                if (idx !== -1) actors.splice(idx, 1);
                document.body.removeChild(this.wrapper);
            }

            static randomConfig() {
                // pick a configuration that isn't already being used by an actor
                const used = new Set(actors.map(a => a.config));
                const available = actorConfig.filter(cfg => !used.has(cfg));
                if (available.length === 0) {
                    // all actor types are in use; nothing new to spawn
                    return null;
                }
                return available[Math.floor(Math.random() * available.length)];
            }
        }

        function initActors() {
            new Actor(Actor.randomConfig());
            new Actor(Actor.randomConfig());
            new Actor(Actor.randomConfig());
            new Actor(Actor.randomConfig());
            new Actor(Actor.randomConfig());
        }

        let lastTime = null;
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            const width = screenWidth();
            // iterate backwards so removals don't skip items
            for (let i = actors.length - 1; i >= 0; i--) {
                actors[i].update(dt, width);
            }

            requestAnimationFrame(animate);
        }

        initActors();
        requestAnimationFrame(animate);
    </script>
